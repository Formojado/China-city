<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEO-SCANNER SPECTRA: 333 NODES</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --cyan: #00f3ff;
      --magenta: #ff00ff;
      --green: #00ff66;
      --red: #ff3366;
      --gold: #ffcc00;
      --bg: #05070a;
      --panel-bg: rgba(10, 15, 25, 0.9);
    }

    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; color: #fff; }
    
    /* 移除強烈掃描線，改為極淡的裝飾 */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
      background-size: 100% 4px; z-index: 2000;
    }

    /* 移除地圖濾鏡，保持原始清晰度 */
    #map { height: 100vh; width: 100vw; z-index: 1; }

    .header-ui { 
      position: absolute; top: 0; left: 0; width: 100%; height: 160px; 
      background: linear-gradient(to bottom, var(--panel-bg) 0%, transparent 100%); 
      z-index: 1001; pointer-events: none; display: flex; flex-direction: column; align-items: center;
    }

    .conveyor-viewport { 
        width: 100%; height: 120px; overflow: hidden; position: relative; margin-top: 10px;
        -webkit-mask-image: linear-gradient(to right, transparent, black 30%, black 70%, transparent);
    }
    /* 優化動畫曲線為 ease-out 減少卡頓感 */
    .conveyor-belt { display: flex; align-items: center; position: absolute; left: 50%; transition: transform 0.5s ease-out; height: 100%; }
    
    /* 調整非活動城市的透明度為 0.4，原本 0.1 太淡 */
    .city-card { min-width: 280px; text-align: center; opacity: 0.4; transform: scale(0.85); transition: 0.4s; }
    .city-card.active { opacity: 1; transform: scale(1.1); }
    .city-name-cn { font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,243,255,0.5); }
    .city-name-en { font-size: 0.8rem; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }

    .stats-panel { 
        position: absolute; bottom: 30px; left: 30px; z-index: 1002; 
        background: var(--panel-bg); padding: 15px 30px; border-left: 5px solid var(--cyan);
        display: flex; gap: 40px; border-radius: 4px; backdrop-filter: blur(10px);
        border: 1px solid rgba(0,243,255,0.3);
    }
    .stat-label { color: var(--cyan); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 2px; }
    .stat-val { font-family: monospace; font-size: 1.6rem; font-weight: bold; }

    #confirmContainer { position: absolute; bottom: 40px; right: 30px; z-index: 1005; display: none; }
    .btn-confirm { 
      background: var(--cyan); color: #000; border: none; 
      padding: 15px 40px; font-size: 1.2rem; font-weight: 900; cursor: pointer; 
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); pointer-events: auto;
    }

    /* 修正啟動視窗與滑桿操作 */
    .modal-overlay { 
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; 
      z-index: 3000; background: rgba(5, 7, 10, 0.95); pointer-events: auto; 
    }
    .start-box { 
      text-align: center; border: 2px solid var(--cyan); padding: 40px; 
      background: #0a0f19; width: 400px; pointer-events: auto; /* 確保內部元件可點擊 */
    }
    
    /* 增加滑桿感應面積 */
    input[type=range] { 
      width: 100%; accent-color: var(--cyan); margin: 30px 0; cursor: pointer; 
      pointer-events: auto; height: 10px;
    }
    .start-btn { 
      width: 100%; padding: 15px; background: var(--cyan); color: #000; 
      font-weight: 900; border: none; cursor: pointer; font-size: 1.1rem;
    }

    .score-burst { 
      position: fixed; pointer-events: none; color: var(--gold); font-size: 3.5rem; 
      font-weight: 900; z-index: 9999; animation: burst 1.2s ease-out forwards; 
    }
    @keyframes burst { 
      0% { transform: scale(0.5); opacity: 0; } 
      20% { opacity: 1; transform: scale(1.1); } 
      100% { transform: translateY(-100px); opacity: 0; } 
    }
  </style>
</head>

    ];

    let cities=[], idx=0, score=0, totalDist=0, started=false, isProcessing=false;
    let currentClickPos = null, playerMarker = null, targetMarker = null, connectorLine = null;

    // 地圖初始化 (移除過濾器)
    const map = L.map('map',{ zoomControl:false, attributionControl:false }).setView([35, 105], 4);
    L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}').addTo(map);

    // 滑桿同步更新數值
    const slider = document.getElementById('citySlider');
    slider.oninput = (e) => {
        document.getElementById('countDisplay').textContent = e.target.value;
    };

    function startGame() {
        const count = parseInt(slider.value);
        cities = [...DB].sort(() => Math.random() - 0.5).slice(0, count);

        document.getElementById('total').textContent = cities.length;
        document.getElementById('startModal').style.display = 'none';
        document.getElementById('viewport').style.display = 'block';
        document.getElementById('statsPanel').style.display = 'flex';
        
        const belt = document.getElementById('belt');
        belt.innerHTML = cities.map(c => `
            <div class="city-card">
                <div class="city-name-cn">${c.cn}</div>
                <div class="city-name-en">${c.en}</div>
            </div>
        `).join('');
        
        started = true;
        updateConveyor();
    }

    function updateConveyor() {
        const offset = -(idx * 280);
        document.getElementById('belt').style.transform = `translateX(${offset - 140}px)`;
        const cards = document.querySelectorAll('.city-card');
        cards.forEach((card, i) => card.classList.toggle('active', i === idx));
        document.getElementById('progress').textContent = idx + 1;
        isProcessing = false;
    }

    map.on('click', e => {
        if(!started || isProcessing) return;
        currentClickPos = e.latlng;
        if(playerMarker) map.removeLayer(playerMarker);
        
        playerMarker = L.circleMarker(e.latlng, {
            radius: 12, color: '#fff', fillColor: '#ff3366', weight: 3, fillOpacity: 1
        }).addTo(map);
        
        document.getElementById('confirmContainer').style.display = 'block';
    });

    function submitAnswer() {
        if(!started || !currentClickPos || isProcessing) return;
        isProcessing = true;
        document.getElementById('confirmContainer').style.display = 'none';

        const city = cities[idx];
        const dist = map.distance(currentClickPos, city.coords) / 1000;
        const points = Math.round(5000 * Math.pow(Math.E, -dist / 500));
        
        totalDist += dist;
        const avgDist = totalDist / (idx + 1);
        document.getElementById('acc').textContent = Math.max(0, Math.round(100 - avgDist/20)) + "%";

        // 動畫縮放
        map.flyTo(currentClickPos, 6, { duration: 0.5 });

        setTimeout(() => {
            burstScore(points);
            targetMarker = L.circleMarker(city.coords, {
                radius: 15, color: '#00f3ff', fillColor: 'transparent', weight: 3, fillOpacity: 0
            }).addTo(map);
            
            connectorLine = L.polyline([currentClickPos, city.coords], {
                color: '#fff', weight: 2, dashArray: '5, 10', opacity: 0.6
            }).addTo(map);
            
            score += points;
            document.getElementById('score').textContent = score.toLocaleString();
            map.panTo(city.coords);
        }, 500);

        setTimeout(() => {
            idx++;
            if(playerMarker) map.removeLayer(playerMarker);
            if(targetMarker) map.removeLayer(targetMarker);
            if(connectorLine) map.removeLayer(connectorLine);
            
            if(idx < cities.length) { 
                updateConveyor(); 
                map.flyTo([35, 105], 4, { duration: 0.8 }); 
            } else { 
                alert("GAME OVER!\nFINAL SCORE: " + score); 
                location.reload(); 
            }
        }, 3000);
    }

    function burstScore(pts) {
        const screenPos = map.latLngToContainerPoint(currentClickPos);
        const div = document.createElement('div');
        div.className = 'score-burst';
        div.style.left = screenPos.x + 'px';
        div.style.top = screenPos.y + 'px';
        div.innerHTML = `+${pts}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1200);
    }

    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('confirmBtn').onclick = submitAnswer;

    // 快捷鍵
    window.addEventListener('keydown', e => {
        if(e.code === 'Space' && document.getElementById('confirmContainer').style.display === 'block') {
            e.preventDefault(); submitAnswer();
        }
    });
